<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光之拼图 - 约束求解器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-slate-200 p-4">
    <!-- 顶部标题 -->
    <header class="text-center mb-8 slide-in">
        <h1 class="font-cyber text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-2 tracking-widest">
            光之拼图
        </h1>
        <p class="text-slate-400 text-sm md:text-base">M78 星云 · 约束求解系统</p>
    </header>

    <div class="max-w-screen-2xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 左侧：拼图块库 -->
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-700">
                <h2 class="font-cyber text-xl font-bold mb-4 text-cyan-400 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>拼图元件库</h2>
                    <p class="text-xs text-slate-400 mb-3">点击格子切换颜色（绿↔黄），拖拽到下方盒子使用</p>
                <div id="pieceLibrary" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                    <!-- 预设拼图块将在这里生成 -->
                </div>
                
                <button onclick="addNewPiece()" class="mt-4 w-full py-2 px-4 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2 btn-hover">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    添加新拼图块
                </button>
            </div>

            <!-- 使用中的拼图块 -->
            <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-700 min-h-[200px]">
                <h3 class="font-bold text-slate-300 mb-3 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                    任务盒子 <span class="text-xs text-slate-500">(拖拽到此处)</span>
                </h3>
                <div id="activePieces" class="drop-zone min-h-[120px] rounded-xl p-2 space-y-2 transition-all">
                    <p class="text-slate-500 text-sm text-center py-8">将上方拼图块拖放到这里</p>
                </div>
            </div>
        </div>

        <!-- 中间：主网格 -->
        <div class="lg:col-span-6 space-y-4">
            <!-- 网格设置 -->
            <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-700 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-3">
                    <label class="text-sm font-bold text-slate-400">网格尺寸:</label>
                    <input type="number" id="gridRows" value="5" min="3" max="10" class="w-16 px-2 py-1 bg-slate-700/50 border border-slate-600 rounded text-center font-cyber text-cyan-400" onchange="updateGridSize()">
                    <span class="text-slate-500">×</span>
                    <input type="number" id="gridCols" value="5" min="3" max="10" class="w-16 px-2 py-1 bg-slate-700/50 border border-slate-600 rounded text-center font-cyber text-cyan-400" onchange="updateGridSize()">
                </div>
                <div class="flex gap-2 text-xs">
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-emerald-500 rounded"></div><span>绿色约束</span></div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-amber-400 rounded"></div><span>黄色约束</span></div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-slate-600 rounded"></div><span>禁用</span></div>
                </div>
            </div>

            <!-- 主游戏区域 -->
            <div class="bg-slate-900/80 rounded-2xl p-6 border border-slate-700 relative overflow-hidden">
                <!-- 装饰背景 -->
                <div class="absolute inset-0 opacity-5 pointer-events-none">
                    <div class="absolute top-0 left-0 w-full h-full" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 20px 20px;"></div>
                </div>

                <div class="relative z-10 flex flex-col items-center gap-1" id="gameGrid">
                    <!-- 顶部约束输入 -->
                    <div class="flex gap-1 mb-2" id="topConstraints">
                        <!-- 动态生成 -->
                    </div>
                    
                    <div class="flex gap-1">
                        <!-- 左侧约束 -->
                        <div class="flex flex-col gap-1 mr-2" id="leftConstraints">
                            <!-- 动态生成 -->
                        </div>
                        
                        <!-- 主网格 -->
                        <div id="mainGrid" class="grid gap-1 p-2 bg-slate-800 rounded-xl border border-slate-700">
                            <!-- 动态生成 -->
                        </div>
                        
                        <!-- 右侧约束 -->
                        <div class="flex flex-col gap-1 ml-2" id="rightConstraints">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    
                    <!-- 底部约束 -->
                    <div class="flex gap-1 mt-2" id="bottomConstraints">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <div class="mt-6 text-center text-sm text-slate-400">
                    <p>点击网格：循环切换状态（禁用 → 绿 → 黄 → 空）</p>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="flex gap-3 justify-center">
                <button onclick="validateAndSolve()" class="px-8 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 rounded-xl font-bold text-white shadow-lg shadow-cyan-500/30 transition-all transform hover:scale-105 flex items-center gap-2 btn-hover">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                    开始求解
                </button>
                <button onclick="clearGrid()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-slate-200 transition-all btn-hover">
                    清空网格
                </button>
                <button onclick="clearSolution()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-slate-200 transition-all btn-hover">
                    清除解答
                </button>
            </div>
        </div>

        <!-- 右侧：状态和信息 -->
        <div class="lg:col-span-3 space-y-4">

            <!-- 约束状态 -->
            <div class="bg-slate-800/50 backdrop-blur rounded-2xl p-4 border border-slate-700" id="constraintStatusBox">
                <h3 class="font-cyber text-lg font-bold mb-4 text-purple-400">约束状态</h3>
                <div id="solverStatus" class="text-slate-400 text-sm"></div>
                <div id="solutionSteps" class="mt-3 text-xs font-mono overflow-y-auto"></div>
            </div>

            <div class="bg-slate-800/30 rounded-xl p-4 text-xs text-slate-500 space-y-2">
                <p>• 上/左约束（绿色）：该列/行应填充的绿色方块数量</p>
                <p>• 下/右约束（黄色）：该列/行应填充的黄色方块数量</p>
            </div>
        </div>
    </div>

    <!-- JavaScript 模块 -->
    <script src="js/state.js"></script>
    <script src="js/pieces.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/constraints.js"></script>
    <script src="js/solver.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
